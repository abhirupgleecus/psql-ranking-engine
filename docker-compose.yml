services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: psql-ranking-poc-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: psql_ranking_poc
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d psql_ranking_poc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
